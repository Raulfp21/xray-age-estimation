<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSPE — Mandible Testing Tool</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; font-size: 14px; line-height: 1.6; }
.page { max-width: 900px; margin: 0 auto; padding: 20px; }
.card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.viewer-container { width: 100%; height: 500px; background: #000; border-radius: 8px; border: 1px solid #334155; margin-bottom: 16px; position: relative; }
model-viewer { width: 100%; height: 100%; }
.btn { background: #2563eb; color: #fff; padding: 12px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; margin-right: 10px; margin-bottom: 10px; }
.pin { background: #ef4444; border-radius: 50%; border: 2px solid #fff; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: 700; cursor: pointer; }
table { width: 100%; border-collapse: collapse; margin-top: 10px; }
td { border: 1px solid #334155; padding: 8px; }
input { background: #0f172a; border: 1px solid #475569; color: #fff; padding: 8px; width: 100%; border-radius: 4px; }
</style>
</head>
<body>

<div class="page">
  <div class="card">
    <h2>Mandible Testing Controls</h2>
    <p style="margin-bottom:15px; color:#94a3b8;">Choose a mandible to load into the 3D viewer:</p>
    <button class="btn" onclick="loadModel('./mandible1.glb', 'Mandible Specimen 1')">Load Mandible 1</button>
    <button class="btn" onclick="loadModel('./mandible2.glb', 'Mandible Specimen 2')">Load Mandible 2</button>
    <div id="status-box" style="margin-top:10px; color:#60a5fa; font-weight:bold;">Current: None loaded</div>
  </div>

  <div class="card">
    <div class="viewer-container">
      <model-viewer id="mandible-model" camera-controls interaction-prompt="none" shadow-intensity="1"></model-viewer>
    </div>
  </div>

  <div class="card">
    <h2>Anatomical Pinning</h2>
    <table>
      <thead>
        <tr><th>Pin</th><th>Landmark Name</th></tr>
      </thead>
      <tbody id="anatomy-table-body">
        <tr id="empty-row"><td colspan="2" style="text-align:center;">Click on 3D model to pin</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let pinCount = 0;
const mv = document.getElementById('mandible-model');
const tbody = document.getElementById('anatomy-table-body');

function loadModel(path, name) {
  document.getElementById('status-box').innerText = "Current: " + name;
  mv.src = path;
  clearPins();
}

// 3D Pinning Logic
mv.addEventListener('click', (event) => {
  const hit = mv.positionAndNormalFromPoint(event.clientX, event.clientY);
  if (hit) {
    pinCount++;
    const pinId = 'pin-' + pinCount;
    document.getElementById('empty-row')?.remove();
    
    const pin = document.createElement('button');
    pin.className = 'pin';
    pin.slot = 'hotspot-' + pinCount;
    pin.dataset.position = hit.position.toString();
    pin.innerText = pinCount;
    mv.appendChild(pin);

    const tr = document.createElement('tr');
    tr.id = 'row-' + pinId;
    tr.innerHTML = `<td>${pinCount}</td><td><input type="text" placeholder="Enter Landmark"></td>`;
    tbody.appendChild(tr);
  }
});

function clearPins() {
  const pins = mv.querySelectorAll('.pin');
  pins.forEach(p => p.remove());
  tbody.innerHTML = '<tr id="empty-row"><td colspan="2" style="text-align:center;">Click on 3D model to pin</td></tr>';
  pinCount = 0;
}
</script>
</body>
</html>
